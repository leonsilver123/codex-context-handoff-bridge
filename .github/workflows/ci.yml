name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run regression tests
        shell: pwsh
        run: python scripts\test_codex_handoff.py

      - name: Verify current scaffold
        shell: pwsh
        run: .\scripts\codex-handoff.ps1 verify

      - name: Run smoke test
        shell: pwsh
        run: .\scripts\handoff-smoke.ps1 -SkipAuto

      - name: Test clean install
        shell: pwsh
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP "codex-handoff-clean-project"
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          .\install.ps1 -ProjectPath $tmp -Force
          Push-Location $tmp
          .\scripts\codex-handoff.ps1 verify
          .\scripts\codex-handoff.ps1 completion-audit --json
          Pop-Location
